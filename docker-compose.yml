services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
      POSTGRES_DB: crawldb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler"]
      interval: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      CRAWLER_POSTGRES_DSN: postgresql://crawler:crawler@postgres/crawldb
    depends_on:
      postgres:
        condition: service_healthy

  crawler:
    build: .
    command: >
      crawler crawl ${CRAWL_SEED_URL:-https://example.com}
        --max-pages ${CRAWL_MAX_PAGES:-100}
        --max-depth ${CRAWL_MAX_DEPTH:-3}
        --concurrency ${CRAWL_CONCURRENCY:-5}
        --delay ${CRAWL_DELAY:-1.0}
        --any-domain
        --postgres postgresql://crawler:crawler@postgres/crawldb
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
